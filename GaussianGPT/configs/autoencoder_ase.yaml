# Autoencoder configuration for ASE chunk training.
# Fill data.cache_root with the cache root generated by the local ASE preprocessing.

model:
  base_ch: 128
  base_voxel_size: 0.025
  n_down: 3
  codebook_size: 4096
  use_sh: false

data:
  dataset: ase
  cache_root: null
  scene_ids: null
  train_scene_ids: null
  val_scene_ids: null
  base_voxel_size: 0.025
  ase_chunk_size: 4.0
  top_k_cameras: 12
  z_mode: fixed_160
  min_occupancy_ae: 0.2
  max_candidate_chunks: 10
  preferred_coverage: 0.4
  num_samples_per_epoch: 1000
  num_workers: 4
  val_num_workers: 2
  seed: 42

loss:
  lambda_rgb: 7.5
  lambda_perc: 0.3
  lambda_occ: 1.0
  lambda_lfq: 0.1
  n_images: 12
  render_size: 512
  vgg19_weights_path: null
  fov_deg: 60.0
  radius_factor: 1.5
  upper_hemisphere_only: false
  camera_jitter: 0.05

training:
  epochs: 6000
  batch_size: 4
  effective_batch_size: 8
  lr: 1.0e-4
  lr_min_ratio: 0.1
  save_every: 1500
  val_every_steps: 6000

diagnostics:
  color_check_every: 600

debug:
  norm: "bn"
  color_activation: "clamp"
  fixed_chunk: false
  no_augment: false
  voxel_dedup: "random"
  grad_clip: 1.0
  log_grad_norm_every: 0
